apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: podinfo-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  groups:
  - name: podinfo
    rules:
    - alert: PodInfoHighRequestRate
      expr: rate(http_requests_total{job="podinfo"}[1m]) > 0.5
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High request rate on podinfo"
        description: "podinfo is receiving more than 0.5 requests per second"
    - alert: PodRestartingTooMuch
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod restarting frequently"
        description: "Pod {{ $labels.pod }} is restarting too much"
