apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: "observability123"
          service:
            type: ClusterIP
        prometheus:
          prometheusSpec:
            retention: 24h
            resources:
              requests:
                memory: 400Mi
              limits:
                memory: 800Mi
        alertmanager:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
